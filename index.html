<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="author" content="Arda Eker">
  <meta name="description"
    content="This is a solution to the Product preview card component challenge on Frontend Mentor. Frontend Mentor challenges help you improve your coding skills by building realistic projects.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./src/images/favicon-32x32.png">
  <link rel="stylesheet" href="./src/css/stlye.css">
  <title>Frontend Mentor | Product preview card component</title>
</head>

<body>
  <main class="card">
    <h1 class="offscreen">Frontend Mentor</h1>
    <section class="card-header">
      <h2 class="offscreen">Product Image</h2>
    </section>
    <section class="card-content">
      <p class="product-category-title">PERFUME</p>
      <h2 class="product-title">Gabrielle Essence Eau De Parfum</h2>
      <p class="product-detail">A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.</p>
      <section class="product-price">
        <h2 class="discount-price">$149.99</h2>
        <p class="without-discount-price">$169.99</p>
      </section>
      <button class="add-to-cart">
        <img src="./src/images/icon-cart.svg" alt="Icon Cart">
        Add to Cart
      </button>
    </section>
  </main>
  <footer>
    <p>
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="https://www.frontendmentor.io/profile/ardaekerFD">Arda Eker</a>.</p>
  </footer>
</body>

</html>
